<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKPACK | Контакты</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 17L10 11L4 5M12 19H20" stroke="#00ff66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            HACK<span>PACK</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="./index.html"><i class="fa-solid fa-house"></i> Главная</a></li>
                <li><a href="./tools.html"><i class="fa-solid fa-terminal"></i> Инструменты</a></li>
                <li><a href="./tutorials.html"><i class="fa-solid fa-book-bookmark"></i> Гайды</a></li>
                <li><a href="./contact.html" class="active"><i class="fa-solid fa-envelope"></i> Контакты</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2 class="page-title"><i class="fa-solid fa-headset"></i> Обратная связь</h2>
        
        <div class="form-wrapper">
            <form class="contact-form" onsubmit="event.preventDefault(); alert('Сообщение зашифровано и отправлено!');">
                <div class="form-group">
                    <label>Твой Alias (Никнейм)</label>
                    <input type="text" placeholder="Введите ник..." required>
                </div>
                <div class="form-group">
                    <label>Secure Email</label>
                    <input type="email" placeholder="example@proton.me" required>
                </div>
                <div class="form-group">
                    <label>Зашифрованное сообщение</label>
                    <textarea rows="5" placeholder="Ваш текст..." required></textarea>
                </div>
                <button type="submit" class="btn"><i class="fa-solid fa-paper-plane"></i> Отправить</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 HACKPACK. Все права защищены. Только для образовательных целей.</p>
    </footer>

</body>
</html>
