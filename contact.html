<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKPACK | Связь по защищенному каналу</title>
    <meta name="description" content="Форма обратной связи для отправки зашифрованных отчетов об уязвимостях и сотрудничества.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 17L10 11L4 5M12 19H20" stroke="#00ff66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            HACK<span>PACK</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="./index.html">Главная</a></li>
                <li><a href="./tools.html">Инструменты</a></li>
                <li><a href="./tutorials.html">Гайды</a></li>
                <li><a href="./chat.html">Голосовой Чат</a></li>
                <li><a href="./contact.html" class="active">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1 class="page-title">Отправить зашифрованный пакет</h1>
        
        <div class="form-wrapper">
            <form action="#">
                <div class="form-group">
                    <label for="uid">Идентификатор (Никнейм)</label>
                    <input type="text" id="uid" required placeholder="Введите ваш позывной...">
                </div>
                <div class="form-group">
                    <label for="email">Secure Email</label>
                    <input type="email" id="email" required placeholder="contact@domain.com">
                </div>
                <div class="form-group">
                    <label for="msg">Шифротекст (Сообщение)</label>
                    <textarea id="msg" rows="6" required placeholder="Введите текст сообщения..."></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Инициировать передачу</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 HACKPACK. Все права защищены. Только для образовательных целей.</p>
    </footer>

</body>
</html>
